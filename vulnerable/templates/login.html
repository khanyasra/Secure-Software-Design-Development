<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --card: #111827;
      --border: #1f2d45;
      --accent: #f97316;
      --accent2: #fb923c;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #ef4444;
      --warn-bg: #2d1a00;
      --warn-border: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .wrapper {
      width: 100%;
      max-width: 420px;
    }
    .badge {
      display: inline-block;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      color: var(--accent);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
    }
    .field { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.85rem;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.75rem;
      border-radius: 4px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn:hover { background: var(--accent2); }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 0.65rem 0.85rem;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-bottom: 1.2rem;
    }
    .link-row {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .link-row a { color: var(--accent); text-decoration: none; }
    .hint {
      margin-top: 1.5rem;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.72rem;
      color: var(--accent2);
      line-height: 1.7;
    }
    .hint strong { display: block; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.4rem; color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="badge">⚠ Vulnerable Version</div>
    <h1>Student <span>Portal</span></h1>
    <p class="subtitle">University Academic Management System</p>

    <div class="card">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button class="btn" type="submit">Sign In</button>
      </form>

      <div class="link-row">
        Don't have an account? <a href="/register">Register</a>
      </div>
    </div>

    <div class="hint">
      <strong>💀 SQL Injection Demo</strong>
      Username: <code>admin'--</code><br>
      Password: <code>anything</code><br>
      → Bypasses password check entirely via injected comment
    </div>
  </div>
</body>
</html>
